rerun:
  output_dir: "src/data/rerun_outputs"
  application_id: "data_analyzer_agent"
  spawn_viewer: false # Set true to auto-launch the Rerun viewer

robocopy:
  path: "robocopy.exe" # Windows built-in
  default_flags: "/COPYALL /DCOPY:T /E /R:1 /W:1"

bytesoup_converter:
  path: "${BYTESOUP_CONVERTER_PATH}"
  output_format: "mat"

aos_checker:
  path: "${AOS_CHECKER_PATH}"
  default_checks:
    - "signal_range"
    - "signal_continuity"
    - "timestamp_validity"
